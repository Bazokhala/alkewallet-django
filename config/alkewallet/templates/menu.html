{% extends 'base.html' %} {% load static %} {% block content %}
<style>
    /* El contenedor centrado ayuda a la visualización en dispositivos móviles */
    .container-menu {
        max-width: 400px;
        margin: auto;
        padding: 20px;
    }
    .balance-display {
        background-color: #f8f9fa;
        padding: 20px;
        border-radius: 10px;
        margin-bottom: 20px;
        text-align: center;
    }
</style>

<div class="container-menu">
    <h2 class="mb-4">Mi Billetera</h2>

    <div class="balance-display shadow-sm">
        <label for="balance" class="text-muted">Tu Saldo Actual:</label>
        <h3 id="saldo" class="text-primary fw-bold">${{ saldo|default:"0" }}</h3>
    </div>

    <div class="d-grid gap-2">
        <a
            href="{% url 'deposit' %}"
            class="btn btn-primary btn-lg"
            onclick="loadingScreen('Redirigiendo a Depositar')"
        >
            Depositar
        </a>

        <a
            href="{% url 'send_money' %}"
            class="btn btn-primary btn-lg"
            onclick="loadingScreen('Redirigiendo a Enviar Dinero')"
        >
            Enviar Dinero
        </a>

        <a
            href="{% url 'transactions' %}"
            class="btn btn-outline-secondary btn-lg"
            onclick="loadingScreen('Redirigiendo a Últimos Movimientos')"
        >
            Últimos Movimientos
        </a>
    </div>
</div>

<!-- <script src="{% static 'js/script.js' %}"></script> -->
{% endblock %}
